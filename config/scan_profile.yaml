active_profile: comprehensive
profiles:
  quick:
    description: Fast triage using the most common ports and highest-severity templates.
    ports: top-100
    version_intensity: 1
    nuclei_rate: 100
    nuclei_concurrency: 25
    nuclei_severity: critical,high
    skip_nikto: false
    skip_ssllabs: false
    max_rate_pps: 200
    scan_delay_ms: 20
    http_request_delay_s: 1.0
  standard:
    description: Balanced scan with good coverage and acceptable noise level.
    ports: top-1000
    version_intensity: 2
    nuclei_rate: 50
    nuclei_concurrency: 10
    nuclei_severity: critical,high,medium
    skip_nikto: false
    skip_ssllabs: false
    max_rate_pps: 100
    scan_delay_ms: 50
    http_request_delay_s: 2.0
  thorough:
    description: Exhaustive TCP coverage with conservative timing.
    ports: 1-65535
    version_intensity: 5
    nuclei_rate: 25
    nuclei_concurrency: 5
    nuclei_severity: critical,high,medium,low
    skip_nikto: false
    skip_ssllabs: false
    max_rate_pps: 50
    scan_delay_ms: 100
    http_request_delay_s: 3.0
  comprehensive:
    description: Full TCP and UDP coverage, all discovered hosts, all severities, and parallel quality-preserving enumeration.
    ports: 1-65535
    version_intensity: 5
    nuclei_rate: 150
    nuclei_concurrency: 50
    nuclei_severity: critical,high,medium,low,info
    skip_nikto: false
    skip_ssllabs: false
    max_rate_pps: 2000
    scan_delay_ms: 0
    http_request_delay_s: 0.2
