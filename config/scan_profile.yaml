active_profile: thorough
profiles:
  quick:
    description: Explicit reduced-coverage mode for troubleshooting only; scans common ports and critical/high findings.
    ports: top-100
    version_intensity: 1
    nuclei_rate: 100
    nuclei_concurrency: 25
    nuclei_severity: critical,high
    skip_nikto: false
    skip_ssllabs: false
    max_rate_pps: 200
    scan_delay_ms: 20
    http_request_delay_s: 1.0
  standard:
    description: Complete TCP coverage with moderate service fingerprinting and all safe Nuclei severities.
    ports: 1-65535
    version_intensity: 3
    nuclei_rate: 100
    nuclei_concurrency: 20
    nuclei_severity: critical,high,medium,low,info
    skip_nikto: false
    skip_ssllabs: false
    max_rate_pps: 200
    scan_delay_ms: 20
    http_request_delay_s: 1.0
  thorough:
    description: Default exhaustive profile covering all TCP ports, configured UDP ports, every open service, and all safe Nuclei severities.
    ports: 1-65535
    version_intensity: 5
    nuclei_rate: 100
    nuclei_concurrency: 25
    nuclei_severity: critical,high,medium,low,info
    skip_nikto: false
    skip_ssllabs: false
    max_rate_pps: 200
    scan_delay_ms: 20
    http_request_delay_s: 1.0
