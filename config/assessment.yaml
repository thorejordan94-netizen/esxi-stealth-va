  parallel_hosts: 6
  script_timeout: 90s
  host_timeout: 30m
  timeout: 7200
  additional_safe_scripts: []
phases:
  phase0_update: false
  phase1_init: true
  phase2_discovery: true
  phase3_enum: true
  phase4_crypto: true
  phase5_web: true
  phase6_vulnscan: true
  phase7_delta: true
scan:
  ports: 1-65535
  esxi_ports: 22,80,443,427,902,5988,5989,8000,8080,9080,9443
  version_intensity: 5
  max_retries: 2
  parallel_hosts: 6
  discovery_max_rate_pps: 2000
  timing_template: 4
  scan_delay_ms: 0
  nmap_host_timeout: 30m
  host_timeout_s: 7200
  esxi_timeout_s: 7200
