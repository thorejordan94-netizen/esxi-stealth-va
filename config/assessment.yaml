target:
  ip: 10.251.2.28
  hostname: sl001983.de.internal.net
  role: VMware ESXi Host Client
  executor: root
  target_domain: sl001983.de.internal.net
auto_network:
  include_virtual_interfaces: true
  allow_public_subnets: true
  detect_esxi: true
  esxi_detection_timeout_s: 90
  discovery_rate_pps: 2000
  max_esxi_candidates: 1024
vm_discovery:
  method: sweep
  subnets:
  - 10.251.2.0/24
  - 192.168.157.0/24
  exclude_ips:
  - 10.251.2.1
  - 10.251.2.25
  - 10.251.2.28
  - 10.251.2.255
  static_ips: []
  max_hosts: 0
  discovery_probes:
    enabled: true
    mode: fallback
    ps_ports: 22,80,443,902,5989
    pa_ports: 80,443
  known_vms:
  - v268tmp
  - va010
  - va011
  - va012
  - va013
  - va014
  - va015
  - va016
  - va017
  - va018
  - va019-ansible
expanded_discovery:
  tcp_ports: ''
  esxi_ports: 22,80,443,427,902,5988,5989,8000,8080,9080,9443
  allow_public_subnets: true
  max_addresses_per_subnet: 65536
  max_addresses_per_sweep: 4096
  neighbor_cache: true
  udp:
    enabled: true
    top_ports: 20
    version_intensity: 1
    max_retries: 1
    timeout: 300
security_tests:
  enabled: true
  max_ports_per_host: 128
  script_timeout: 45s
  host_timeout: 5m
  timeout: 300
  additional_safe_scripts: []
phases:
  phase0_update: true
  phase1_init: true
  phase2_discovery: true
  phase3_enum: true
  phase4_crypto: true
  phase5_web: true
  phase6_vulnscan: true
  phase7_delta: true
scan:
  ports: top-1000
  esxi_ports: 80,443,902,5989,8000,8080,9080
  version_intensity: 2
  max_retries: 1
  nmap_host_timeout: 5m
  host_timeout_s: 300
  esxi_timeout_s: 300
  progress_interval_s: 15
stealth:
  network:
    interface: ''
crypto:
  tls_ports:
  - '443'
  prefer_testssl: true
  scan_all_hosts: true
ssl_automation:
  enabled: true
  subnets: []
ssllabs:
  enabled: true
  api_url: https://api.ssllabs.com/api/v3
  max_age_hours: 24
  poll_interval_s: 30
  max_poll_attempts: 40
  publish: 'off'
  domain_filter: ''
web:
  base_url: https://10.251.2.28
  paths:
  - /ui/
  - /ui/#/login
  - /sdk
  - /mob
  - /host
  - /
  verify_ssl: true
  scan_all_hosts: true
  use_nikto: true
nuclei:
  enabled: true
  templates_dir: ''
  severity_filter: critical,high,medium
  rate_limit: 50
  concurrency: 10
  timeout: 10
  tags:
  - cve
  - misconfig
  - exposure
  - default-login
  - tech
  exclude_tags:
  - dos
  - fuzz
  - intrusive
  - sqli
  - xss
  extra_args: []
delta:
  enabled: true
  history_dir: ''
  keep_weeks: 12
update:
  git_pull: true
  nuclei_templates: true
  offline_templates_tarball: ''
  system_tools: true
environment:
  classification: Internal / Isolated ESXi Network
  assessment_type: Automated Weekly Pentest
  change_request: ''
  notes: Wöchentlicher automatisierter Pentest — ESXi-Netzwerk mit 50+ VMs
tool_paths:
  nmap: /usr/bin/nmap
  nuclei: /usr/local/bin/nuclei
  testssl: /usr/local/bin/testssl.sh
  nikto: /usr/bin/nikto
email:
  enabled: true
  recipient: thorejordan94@gmail.com
  sender: assessment@codespaces-128708.local
  subject: ESXi assessment report
  scope:
  - HTML report
  - JSON report
  - Delta summary
  - Errors and health status
  backend: local
  host: 127.0.0.1
  port: 25
  hostname: codespaces-128708.local
  domain: codespaces-128708.local
  setup: true
  health_check: true
  sendmail_path: /usr/sbin/sendmail
