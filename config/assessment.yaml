# ============================================================================
# ESXi Pentest Framework — Central Configuration
# ============================================================================
# Environment: Isolated ESXi Network (air-gapped / semi-online)
# Scope:       50+ VMs, full network sweep
# Rhythm:      Weekly automated execution
# ============================================================================

# --- Primary Target (ESXi Host) ---
target:
  ip: "10.251.2.28"
  hostname: "sl001983.de.internal.net"
  role: "VMware ESXi Host Client"
  executor: "root"
  target_domain: "sl001983.de.internal.net"

# --- Automatic Runtime Scope ---
# No target is required at launch. Physical/private interfaces are detected,
# container bridges are ignored, and ESXi identification uses live hosts only.
auto_network:
  include_virtual_interfaces: false
  allow_public_subnets: false
  detect_esxi: true
  esxi_detection_timeout_s: 90
  discovery_rate_pps: 2000
  max_esxi_candidates: 1024

# --- VM Discovery (Multi-Subnet Sweep) ---
# The framework will perform a gentle ARP/ICMP sweep to enumerate live hosts.
# Set 'method' to 'sweep' for automatic discovery or 'static' for manual list.
vm_discovery:
  method: "sweep"
  # Subnet(s) to sweep — only private RFC1918 ranges allowed
  subnets:
    - "10.251.2.0/24"
    # Uncomment to add secondary network:
    - "192.168.157.0/24"
  # Exclude these IPs from VM findings (gateways, scanner, ESXi host, etc.)
  exclude_ips:
    - "10.251.2.1"      # Default gateway (assumed)
    - "10.251.2.25"     # Scanner host (vl268tmp)
    - "10.251.2.28"     # ESXi host — scanned separately as primary target
    - "10.251.2.255"    # Broadcast
  # If method=static, list VM IPs here instead:
  static_ips: []
  # 0 means every discovered live target. Set a positive value only when an
  # explicitly bounded maintenance window requires a cap.
  max_hosts: 0
  # Optional host-discovery probe tuning for harder-to-ping networks.
  # Conservative default: disabled (pure ping/ARP only).
  discovery_probes:
    enabled: true
    # fallback = only retry with probes when ping sweep finds nothing
    # always   = run ping + probe discovery and merge both results
    mode: "fallback"
    # Optional nmap ping probes (examples):
    #   ps_ports: "22,80,443"  -> adds -PS22,80,443
    #   pa_ports: "80,443"     -> adds -PA80,443
    ps_ports: "22,80,443,902,5989"
    pa_ports: "80,443"
  # Known VM names for correlation (optional — enriches report)
  known_vms:
    - "v268tmp"
    - "va010"
    - "va011"
    - "va012"
    - "va013"
    - "va014"
    - "va015"
    - "va016"
    - "va017"
    - "va018"
    - "va019-ansible"

# --- Expanded Internal Discovery ---
# Broad private scopes are accepted up to /16 and split into smaller sweeps so
# progress remains visible. Public scope is refused unless explicitly enabled.
expanded_discovery:
  # Empty preserves the selected quick/standard/thorough profile.
  tcp_ports: ""
  esxi_ports: "22,80,443,427,902,5988,5989,8000,8080,9080,9443"
  allow_public_subnets: false
  max_addresses_per_subnet: 65536
  max_addresses_per_sweep: 4096
  neighbor_cache: true
  udp:
    enabled: true
    top_ports: 20
    version_intensity: 1
    max_retries: 1
    timeout: 900

# --- Safe Internal Security Tests ---
# Deterministic enumeration/configuration scripts only; no brute force,
# exploitation, fuzzing, intrusive checks, or denial-of-service scripts.
security_tests:
  enabled: true
  max_ports_per_host: 128
  script_timeout: "45s"
  host_timeout: "20m"
  timeout: 1200
  additional_safe_scripts: []

# --- Phase Toggles ---
# Set any phase to false to skip it entirely
phases:
  phase0_update:        true
  phase1_init:          true
  phase2_discovery:     true
  phase3_enum:          true
  phase4_crypto:        true
  phase5_web:           true
  phase6_vulnscan:      true
  phase7_delta:         true

# --- Scan Settings ---
scan:
  # Port specification for host/VM scans
  ports: "top-1000"
  # ESXi-specific ports to always include
  esxi_ports: "80,443,902,5989,8000,8080,9080"
  # Service version detection intensity (0-9, lower = quieter)
  version_intensity: 2
  max_retries: 1
  nmap_host_timeout: "15m"
  host_timeout_s: 600
  esxi_timeout_s: 900
  progress_interval_s: 15

# --- Optional Stealth Overrides ---
# Optional scan interface for nmap (-e). Leave empty for route-based autodetection.
stealth:
  network:
    interface: ""

# --- TLS / Crypto Settings ---
crypto:
  # Ports to automatically check for TLS (additional HTTPS ports detected dynamically)
  tls_ports:
    - 443
  # Prefer testssl.sh if available (auto-detected)
  prefer_testssl: true
  # Scan ALL discovered hosts with HTTPS ports (not just ESXi host)
  scan_all_hosts: true

# --- Standalone SSL Automation ---
# Legacy pre-pipeline HTTPS sweep. Leave subnets empty to reuse vm_discovery.subnets.
ssl_automation:
  # The main crypto phase already assesses every discovered TLS service.
  # Keep the legacy pre-scan off to avoid duplicate subnet scans.
  enabled: false
  subnets: []

# --- SSL Labs API Settings ---
# NOTE: SSL Labs requires internet access to the target.
# In an air-gapped network, leave 'enabled: false' and use testssl.sh instead.
ssllabs:
  enabled: false
  api_url: "https://api.ssllabs.com/api/v3"
  # Accept cached results up to N hours old (reduces API calls)
  max_age_hours: 24
  # Polling interval for async scan results (seconds)
  poll_interval_s: 30
  # Maximum polling attempts before timeout (30s × 40 = 20 min max)
  max_poll_attempts: 40
  # Whether to publish results on SSL Labs website
  publish: "off"
  # Only scan hosts matching this domain pattern (empty = all)
  domain_filter: ""

# --- Web Assessment Settings ---
web:
  # Base URL of the primary ESXi Host Client
  base_url: "https://10.251.2.28"
  # Known ESXi paths to probe on the primary target
  paths:
    - "/ui/"
    - "/ui/#/login"
    - "/sdk"
    - "/mob"
    - "/host"
    - "/"
  # Verify SSL? (false = -k flag for curl, required for self-signed)
  verify_ssl: false
  # Scan ALL discovered hosts with HTTP/HTTPS ports
  scan_all_hosts: true
  # Use nikto if available (auto-detected)
  use_nikto: true

# --- Nuclei Vulnerability Scanning ---
nuclei:
  enabled: true
  # Path to nuclei templates (pre-downloaded for air-gapped use)
  templates_dir: ""  # Empty = use default (~/.local/nuclei-templates)
  # Severity filter — only report findings at these levels
  severity_filter: "critical,high,medium"
  # Rate limiting (requests per second)
  rate_limit: 50
  # Concurrent template executions
  concurrency: 10
  # Timeout per request (seconds)
  timeout: 10
  # Template tags to include
  tags:
    - "cve"
    - "misconfig"
    - "exposure"
    - "default-login"
    - "tech"
  # Template tags to EXCLUDE (noisy or potentially dangerous)
  exclude_tags:
    - "dos"
    - "fuzz"
    - "intrusive"
    - "sqli"
    - "xss"
  # Extra nuclei CLI arguments (advanced)
  extra_args: []

# --- Delta Reporting ---
delta:
  enabled: true
  # Directory to archive weekly reports
  history_dir: "output/history"
  # Number of weeks to keep in history
  keep_weeks: 12

# --- Self-Update Settings ---
update:
  # Pull latest framework code from git remote
  git_pull: true
  # Update nuclei templates
  nuclei_templates: true
  # Offline template update: path to tarball (if air-gapped)
  # Leave empty for online update via 'nuclei -ut'
  offline_templates_tarball: ""
  # Update system tools (requires root/sudo)
  system_tools: false

# --- CyberArk / Environment Metadata ---
environment:
  classification: "Internal / Isolated ESXi Network"
  assessment_type: "Automated Weekly Pentest"
  # Optional: Change Request number for audit trail
  change_request: ""
  notes: "Wöchentlicher automatisierter Pentest — ESXi-Netzwerk mit 50+ VMs"

# --- Tool Paths (Optional) ---
# If tools are not in the system's PATH, specify their full paths here.
tool_paths:
  nmap: "/usr/bin/nmap"
  nuclei: "/usr/local/bin/nuclei"
  testssl: "/usr/local/bin/testssl.sh"
  nikto: "/usr/bin/nikto"
