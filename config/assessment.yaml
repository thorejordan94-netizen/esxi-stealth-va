stealth:
  network:
    interface: ''
crypto:
  tls_ports:
  - '443'
  scan_all_hosts: true
  prefer_testssl: true
ssl_automation:
  enabled: false
  subnets: []
ssllabs:
  enabled: false
  api_url: https://api.ssllabs.com/api/v3
  max_age_hours: 24
  poll_interval_s: 30
  max_poll_attempts: 40
  publish: 'off'
  domain_filter: ''
web:
  base_url: https://10.251.2.28
  paths:
  - /ui/
  - /ui/#/login
  - /sdk
  - /mob
  - /host
  - /
  verify_ssl: false
  scan_all_hosts: true
  use_nikto: true
  parallel_targets: 4
nuclei:
  enabled: true
  templates_dir: ''
  severity_filter: critical,high,medium,low,info
  rate_limit: 150
  concurrency: 50
  timeout: 15
  execution_timeout_s: 86400
  tags: []
  exclude_tags:
  - dos
  - fuzz
  - intrusive
  extra_args: []
delta:
  enabled: true
  history_dir: output/history
  keep_weeks: 12
update:
  git_pull: false
  nuclei_templates: false
  offline_templates_tarball: ''
  system_tools: false
environment:
  classification: Internal / Isolated ESXi Network
  assessment_type: Comprehensive Vulnerability Assessment
  change_request: ''
  notes: Vollständige private Scope-Abdeckung mit allen TCP-/UDP-Ports und kontextueller Ergebnisbewertung.
tool_paths:
  nmap: /usr/bin/nmap
  nuclei: /usr/local/bin/nuclei
  testssl: /usr/local/bin/testssl.sh
  nikto: /usr/bin/nikto
email:
  enabled: true
  recipient: thorejordan94@gmail.com
  sender: assessment@codespaces-128708.local
  subject: ESXi assessment report
  scope:
  - HTML report
  - Markdown report
  - JSON report
  - Delta summary
  - Errors and health status
  backend: local
  host: 127.0.0.1
  port: 25
  hostname: codespaces-128708.local
  domain: codespaces-128708.local
  setup: true
  health_check: true
  sendmail_path: /usr/sbin/sendmail
