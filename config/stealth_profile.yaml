    like Gecko) Chrome/136.0.0.0 Safari/537.36
tls:
  testssl_mode: --sneaky
  connect_timeout_s: 5
  openssl_timeout_s: 5
general:
  inter_phase_delay_s: 2
  max_runtime_s: 0
